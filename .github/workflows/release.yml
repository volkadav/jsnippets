# handles running releases with the maven release plugin

name: Maven Release

on:
  workflow_dispatch: # <— manual trigger
    inputs:
      releaseVersion:
        description: "Release version (e.g. 1.0.0)"
        required: true
      nextVersion:
        description: "Next development SNAPSHOT (e.g. 1.0.1-SNAPSHOT)"
        required: true

permissions:
  contents: write # required to push tags + commits

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required so tags work
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # set Git identity + credentials
      - name: Configure Git for Maven Release
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Force ALL GitHub URLs to use HTTPS with token
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"

      # do the maven release bits
      - name: Maven Release
        run: |
          mvn -B release:clean release:prepare release:perform \
          -DreleaseVersion=${{ github.event.inputs.releaseVersion }} \
          -DdevelopmentVersion=${{ github.event.inputs.nextVersion }} \
          -Dtag=${{ github.event.inputs.releaseVersion }} \
          -DpushChanges=true \
          -Darguments="-Dmaven.deploy.skip=true"

      # set JAR path
      - name: Identify JAR artifact
        id: jarfile
        run: |
          FILE=$(find . -type f -path "*/target/*.jar" -name "*${{ github.event.inputs.releaseVersion }}.jar" | head -n1)
          echo "JAR=$FILE" >> $GITHUB_ENV
          echo "Found JAR: $FILE"

      # do the github bits to make the release and upload the JAR
      - name: Create GitHub Release + upload JAR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.releaseVersion }}" \
            --title "Release ${{ github.event.inputs.releaseVersion }}" \
            --notes "Automated release"

          gh release upload "${{ github.event.inputs.releaseVersion }}" \
            "$JAR"