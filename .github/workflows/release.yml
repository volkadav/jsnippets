# handles running releases with the maven release plugin

name: Maven Release

on:
  workflow_dispatch: # <— manual trigger
    inputs:
      releaseVersion:
        description: "Release version (e.g. 1.0.0)"
        required: true
      nextVersion:
        description: "Next development SNAPSHOT (e.g. 1.0.1-SNAPSHOT)"
        required: true

permissions:
  contents: write # required to push tags + commits

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required so tags work
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # Required so Maven can commit/tag
      - name: Configure Git identity
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      # Do the release
      - name: Maven Release
        run: |
          mvn -B release:prepare \
            -DreleaseVersion=${{ github.event.inputs.releaseVersion }} \
            -DdevelopmentVersion=${{ github.event.inputs.nextVersion }} \
            -Dtag=${{ github.event.inputs.releaseVersion }} \
            -DpushChanges=true

          mvn -B release:perform

      - name: Show resulting version
        run: cat pom.xml

      # Create GitHub Release for this tag if it doesn't exist
      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: create_release
        with:
          tag_name: ${{ github.event.inputs.releaseVersion }}
          release_name: "Release ${{ github.event.inputs.releaseVersion }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload the JAR as an asset in the release
      - name: Upload Release Asset (JAR)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.JAR }}
          asset_name: jsnippets-${{ github.event.inputs.releaseVersion }}.jar
          asset_content_type: application/java-archive
