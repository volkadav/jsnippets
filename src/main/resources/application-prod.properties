# Production Profile Configuration
# Activate with: --spring.profiles.active=prod

# JPA/Hibernate Configuration (Production settings - explicit)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf Configuration (Enable caching for performance)
spring.thymeleaf.cache=true

# Logging Configuration (Production - minimal)
logging.level.root=INFO
logging.level.com.norrisjackson.jsnippets=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Security headers and production optimizations
server.compression.enabled=true
server.http2.enabled=true

# Forward headers from reverse proxy (e.g., nginx, ALB)
# This allows request.getRemoteAddr() to reflect the real client IP
server.forward-headers-strategy=native

# Disable Swagger/OpenAPI UI in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Actuator Configuration (Production - minimal exposure)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true

# API Pagination Configuration (Production)
api.pagination.default-page-size=20
api.pagination.max-page-size=100

