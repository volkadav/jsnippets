# Development Profile Configuration
# Activate with: --spring.profiles.active=development

# JPA/Hibernate Configuration (Development settings)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Thymeleaf Configuration (Disable caching for hot reload)
spring.thymeleaf.cache=false

# Logging Configuration (Development - more verbose)
logging.level.root=INFO
logging.level.com.norrisjackson.jsnippets=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator Configuration (Development - expose more endpoints)
management.endpoints.web.exposure.include=health,info,metrics,env,beans,configprops,mappings
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true

# API Pagination Configuration (Development - same as default)
api.pagination.default-page-size=20
api.pagination.max-page-size=100

