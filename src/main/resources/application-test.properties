# Test Profile Configuration
# Automatically activated during test execution

# In-memory H2 Database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Liquibase for tests (using ddl-auto instead)
spring.liquibase.enabled=false

# Logging Configuration (Test - minimal output)
logging.level.root=WARN
logging.level.com.norrisjackson.jsnippets=INFO

# Actuator Configuration (Test - enable for integration tests)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# API Pagination Configuration (Test - same as default)
api.pagination.default-page-size=20
api.pagination.max-page-size=100

