<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>jsnippets -- login</title>
        <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" />
        <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    </head>
    <body>
    <div class="container mt-5" style="max-width: 400px;">
        <h1 class="mb-4 text-center">Please log in</h1>
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            <span th:text="${error}">Invalid username or password.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-info" role="alert">
            You have been logged out.
        </div>
        <form th:action="@{/login}" method="post" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus />
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required />
            </div>
            <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>
        <p class="mt-3 text-center">Don't have an account? <a th:href="@{/register}">Register here!</a></p>
    </div>
    </body>
</html>
