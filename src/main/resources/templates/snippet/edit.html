<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Snippet</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
    <h1 class="mb-4">Edit Snippet</h1>
    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
    <form th:action="@{'/snippet/{id}/edit'(id=${snippet.id})}" method="post" class="card p-4 shadow-sm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="mb-3">
            <label for="contents" class="form-label">Snippet Contents</label>
            <textarea class="form-control" id="contents" name="contents" rows="8" th:text="${snippet.contents}" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Changes</button>
    </form>
    <a th:href="@{'/snippet/' + ${snippet.id}}" class="btn btn-link mt-3">Back to Snippet</a>
    <a th:href="@{'/snippets'}" class="btn btn-link mt-3">Back to List</a>
</div>
</body>
</html>
