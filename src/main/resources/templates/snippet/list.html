<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Your Snippets</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Your Snippets</h1>
    <a th:href="@{/snippets/new}" class="btn btn-success mb-3">New Snippet</a>
    <div th:if="${snippets != null && #lists.isEmpty(snippets)}" class="alert alert-info">No snippets found.</div>
    <ul class="list-group">
        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="snippet : ${snippets}">
            <span>
                <a th:href="@{'/snippets/' + ${snippet.id}}" th:text="${snippet.id} + ' @ ' + ${snippet.editedAt}"></a>
                <span class="text-muted small ms-2" th:text="${snippet.contents}"></span>
            </span>
            <span>
                <a th:href="@{'/snippets/' + ${snippet.id} + '/edit'}" class="btn btn-sm btn-outline-primary me-2">Edit</a>
                <a th:href="@{'/snippets/' + ${snippet.id} + '/delete'}" class="btn btn-sm btn-outline-danger">Delete</a>
            </span>
        </li>
    </ul>
</div>
</body>
</html>
