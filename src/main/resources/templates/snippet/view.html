<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Snippet</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" />
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div class="container mt-5" style="max-width: 700px;">
    <h1 class="mb-3">Snippet</h1>
    <p class="p-3" th:text="${snippet.contents}">snippet contents</p>
    <p class="fs-6 text-secondary" th:text="${snippet.poster.username} + ' @ ' + ${timezoneService.formatDateInUserTimezone(snippet.editedAt, currentUser.timezone)}">snippet metadata</p>
    <div class="mt-4">
        <a th:if="${isOwner}" th:href="@{'/snippet/' + ${snippet.id} + '/edit'}" class="btn btn-outline-primary me-2">Edit</a>
        <a th:if="${isOwner}" th:href="@{'/snippet/' + ${snippet.id} + '/delete'}" class="btn btn-outline-danger me-2">Delete</a>
        <a th:href="@{/snippets}" class="btn btn-secondary">Back to List</a>
    </div>
</div>
</body>
</html>
