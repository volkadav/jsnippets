# Default configuration (production-safe defaults)
# Override these settings using profile-specific property files or environment variables

# Database Configuration
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:jsnippets}
spring.datasource.username=${PG_USER:jsnippets}
spring.datasource.password=${PG_PASS:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# JPA/Hibernate Configuration (Production defaults)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging Configuration (Production defaults)
logging.level.root=INFO
logging.level.com.norrisjackson.jsnippets=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# Actuator Configuration (Production defaults)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.info.env.enabled=true

# API Pagination Configuration
api.pagination.default-page-size=20
api.pagination.max-page-size=100

# JWT Configuration
# IMPORTANT: Change this secret in production! Must be at least 256 bits (32 characters)
jwt.secret=${JWT_SECRET:jsnippets-super-secret-key-change-this-in-production-minimum-256-bits}
# JWT expiration time in milliseconds (default: 24 hours)
jwt.expiration=${JWT_EXPIRATION:86400000}

# Rate Limiting Configuration
# Maximum number of authentication requests per time window
rate.limit.requests=${RATE_LIMIT_REQUESTS:10}
# Time window in seconds for rate limiting
rate.limit.window-seconds=${RATE_LIMIT_WINDOW:60}
# Email-to-Snippet Ingestion Configuration
# Enable/disable the email polling feature (disabled by default)
email.ingest.enabled=${EMAIL_INGEST_ENABLED:false}
# Mail protocol (imap or pop3)
email.ingest.protocol=${EMAIL_INGEST_PROTOCOL:imap}
# Mail server hostname
email.ingest.host=${EMAIL_INGEST_HOST:}
# Mail server port (default: 993 for IMAPS)
email.ingest.port=${EMAIL_INGEST_PORT:993}
# Mail account username
email.ingest.username=${EMAIL_INGEST_USERNAME:}
# Mail account password
email.ingest.password=${EMAIL_INGEST_PASSWORD:}
# Enable SSL/TLS
email.ingest.ssl-enabled=${EMAIL_INGEST_SSL:true}
# Enable STARTTLS
email.ingest.starttls-enabled=${EMAIL_INGEST_STARTTLS:false}
# Polling interval in minutes
email.ingest.poll-interval-minutes=${EMAIL_INGEST_POLL_INTERVAL:10}
# Initial delay before first poll in minutes
email.ingest.initial-delay-minutes=${EMAIL_INGEST_INITIAL_DELAY:1}
# Mail folder to poll
email.ingest.folder=${EMAIL_INGEST_FOLDER:INBOX}
# Days to retain processed email records
email.ingest.retention-days=${EMAIL_INGEST_RETENTION_DAYS:30}

# Session Storage Configuration
# Store type: none (in-memory), redis (Redis/Valkey)
# Default is 'none' for simple single-server deployments
spring.session.store-type=${SESSION_STORE_TYPE:none}
# Session timeout (default: 30 minutes)
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

# Redis Configuration (only used when spring.session.store-type=redis)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Redis database index (0-15)
spring.data.redis.database=${REDIS_DATABASE:0}
# Connection timeout
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}
# Redis session namespace
spring.session.redis.namespace=${SESSION_REDIS_NAMESPACE:jsnippets:session}

